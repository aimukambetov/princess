<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Сюрприз</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=UnifrakturCook:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Marck+Script&family=Ruslan+Display&display=swap" rel="stylesheet">
<style>
  :root{
    --parch:#f4e7c5; --parch-edge:#e4cf9f; --ink:#3a2a18; --ink-soft:#6b5436;
    --gold:#b0892b; --gold-soft:#caa53d; --red:#9b1b1b; --blue:#1f3a8a;
    --wood1:#5b3a25; --wood2:#3f2718;
    --wand:url('wand.svg') 9 8, auto;
  }
  *{cursor:var(--wand)}
  #yt-holder{position:fixed;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none}
  #music-btn{position:fixed;top:16px;right:18px;z-index:60;width:44px;height:44px;border-radius:50%;
    background:rgba(20,12,6,.5);border:1px solid var(--gold);color:var(--gold-soft);
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);overflow:hidden;
    transition:background .2s,color .2s}
  #music-btn::after{content:"\266A";font-size:22px;line-height:1}
  #music-btn:hover{background:rgba(44,26,12,.7)}
  #music-btn.off{color:#8a7a58}
  #music-btn.off::before{content:"";position:absolute;width:30px;height:2px;background:#caa53d;
    transform:rotate(-45deg);border-radius:2px}
  .trail{position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);
    color:#f6dd84;font-size:var(--sz);line-height:1;will-change:transform,opacity;
    text-shadow:0 0 7px rgba(255,212,130,.85);animation:trail .9s ease-out forwards}
  .trail::before{content:"\2726"}
  @keyframes trail{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(0deg)}
    25%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + 16px)) scale(1) rotate(var(--rot))}
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'EB Garamond',Georgia,serif;color:var(--ink);
    background:
      radial-gradient(42% 38% at 50% 41%, rgba(150,104,56,.40) 0%, rgba(70,46,24,.10) 42%, rgba(0,0,0,0) 70%),
      #000;
    background-color:#000;
    min-height:100svh;display:flex;align-items:center;justify-content:center;
    overflow-x:hidden;-webkit-font-smoothing:antialiased;
  }
  body::before{ /* warm spotlight core pooled on the book */
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(36% 34% at 50% 42%, rgba(255,214,150,.22) 0%, rgba(255,196,126,.06) 44%, transparent 70%);
  }
  body::after{ /* soft beam falling from above */
    content:"";position:fixed;left:50%;top:-10%;width:54vw;height:92vh;transform:translateX(-50%);
    pointer-events:none;z-index:0;
    background:radial-gradient(50% 56% at 50% 0%, rgba(255,224,168,.14), transparent 60%);
  }
  .dust{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:4}
  .dust i{position:absolute;top:0;border-radius:50%;opacity:0;
    background:radial-gradient(circle, rgba(255,236,198,1), rgba(255,208,142,0) 70%);
    animation:drift linear infinite}
  @keyframes drift{
    0%{transform:translate3d(0,108vh,0);opacity:0}
    8%{opacity:var(--o)}
    92%{opacity:var(--o)}
    100%{transform:translate3d(var(--dx),-12vh,0);opacity:0}
  }

  /* ---------- lock / leather tome ---------- */
  #lock{position:relative;z-index:3;width:100%;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px}
  .scene{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:30px;perspective:1600px}
  .tome{position:relative;width:min(82vw,372px);aspect-ratio:600/740;transform-style:preserve-3d;
    transform:rotateX(15deg) rotateZ(-1.3deg);animation:floatBook 6s ease-in-out infinite}
  @keyframes floatBook{
    0%,100%{transform:translateY(0) rotateX(15deg) rotateZ(-1.3deg)}
    50%{transform:translateY(-8px) rotateX(14.2deg) rotateZ(-1.05deg)}
  }
  /* solid book body: back cover -> page block -> front cover, decreasing offset = no hollow */
  .tome-back{position:absolute;inset:0;border-radius:8px 12px 15px 12px;
    background:linear-gradient(160deg,#4a2e18,#281607);
    transform:translate(15px,18px) translateZ(-8px);
    box-shadow:0 34px 54px -12px rgba(0,0,0,.85)}
  .tome-pages{position:absolute;inset:0;border-radius:5px 9px 12px 9px;
    background:repeating-linear-gradient(0deg, #f4e9cd 0 1.7px, #d4bf95 1.7px 3.4px);
    transform:translate(8px, 10px) translateZ(-3px)}
  .tome-pages::after{content:"";position:absolute;inset:0;border-radius:inherit;
    background:linear-gradient(158deg, rgba(255,246,222,.45) 0 8%, rgba(0,0,0,0) 26%, rgba(0,0,0,0) 78%, rgba(48,30,12,.35))}
  .tome-face{position:absolute;inset:0;border-radius:14px;
    background:
      linear-gradient(165deg, rgba(255,226,172,.20), rgba(0,0,0,0) 34%, rgba(0,0,0,.16) 72%, rgba(0,0,0,.42)),
      url('cover.svg') center/100% 100% no-repeat;
    box-shadow:0 8px 12px -4px rgba(0,0,0,.55), 0 0 80px rgba(255,200,130,.14)}
  .tome-face::before{content:"";position:absolute;left:0;top:0;bottom:0;width:22px;border-radius:14px 0 0 14px;
    background:linear-gradient(90deg, rgba(20,10,4,.45), rgba(20,10,4,0));pointer-events:none}
  /* bound leather spine on the left edge — gives the spine side real thickness */
  .tome-spine{position:absolute;left:-9px;top:2px;bottom:4px;width:30px;z-index:3;pointer-events:none;
    border-radius:11px 4px 4px 11px;
    background:linear-gradient(90deg,#1f1208 0%,#46291280 6%,#5b3a22 60%,#2e1c0e 96%,#160c05 100%);
    box-shadow:inset -3px 0 5px rgba(0,0,0,.45), inset 2px 0 3px rgba(255,222,160,.18), -6px 14px 22px rgba(0,0,0,.55)}
  .tome-spine::before,.tome-spine::after{content:"";position:absolute;left:3px;right:4px;height:4px;border-radius:3px;
    background:linear-gradient(#6e4726,#291808)}
  .tome-spine::before{top:24%}.tome-spine::after{bottom:24%}

  .codebar{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;max-width:380px}
  .codebar .lead{font-family:'EB Garamond',serif;font-style:italic;font-size:16px;color:#cdb78a;letter-spacing:.01em}
  .codebar-row{display:flex;align-items:center;gap:16px}
  .codebar input{font-family:'EB Garamond',serif;font-size:18px;color:#f4e7c5;background:transparent;
    border:none;border-bottom:1px solid rgba(202,165,61,.45);outline:none;
    padding:8px 6px 9px;width:190px;text-align:center;letter-spacing:.04em;
    transition:border-color .25s, box-shadow .25s}
  .codebar input::placeholder{color:#8f7a4f;font-style:italic;letter-spacing:0}
  .codebar input:focus{border-bottom-color:var(--gold-soft);box-shadow:0 14px 22px -18px rgba(255,214,140,.9)}
  /* hide the browser's password/contacts autofill key icon */
  .codebar input::-webkit-credentials-auto-fill-button,
  .codebar input::-webkit-contacts-auto-fill-button{visibility:hidden;display:none!important;pointer-events:none;position:absolute;right:0}
  .codebar input::-ms-reveal,.codebar input::-ms-clear{display:none}
  .codebar button{font-family:'Uncial Antiqua',serif;font-size:14px;letter-spacing:.03em;color:var(--gold-soft);cursor:var(--wand);
    background:transparent;border:1px solid rgba(202,165,61,.5);border-radius:999px;padding:10px 26px;
    transition:background .25s,color .25s,border-color .25s,transform .12s}
  .codebar button:hover{background:var(--gold-soft);color:#241405;border-color:var(--gold-soft)}
  .codebar button:active{transform:scale(.97)}
  @keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.16)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
  .err{min-height:16px;font-size:14px;color:#ffd2b0}
  .hint{font-size:13px;color:#e9d6a8;opacity:.65}
  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
  /* flying letters game */
  #letters{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .fly{position:absolute;top:0;left:0;font-family:'Ruslan Display','Uncial Antiqua',serif;color:var(--gold-soft);
    pointer-events:auto;cursor:var(--wand);user-select:none;will-change:transform;
    text-shadow:0 0 8px rgba(255,210,130,.45);transition:color .15s}
  .fly:hover{color:#ffe9b0}
  .fly.wrong{animation:wrongflash .4s}
  @keyframes wrongflash{0%,100%{color:var(--gold-soft)}45%{color:#e3886a;text-shadow:0 0 16px rgba(227,136,106,.85)}}
  .fly.taken{transition:opacity .4s ease;opacity:0}
  /* fairytale title stamped on the cover; flying letters land here */
  .cover-name{position:absolute;left:7%;right:7%;top:10.5%;z-index:1;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;gap:clamp(4px,1.4vw,12px);
    text-align:center;font-family:'Ruslan Display','Uncial Antiqua',serif;line-height:1.15}
  .ct-prefix{font-size:clamp(15px,3.5vw,26px);color:#e7c97e;
    text-shadow:0 1px 1px rgba(40,20,5,.6), 0 0 10px rgba(255,210,130,.22)}
  .ct-word{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(1px,.5vw,5px);min-height:1em}
  .ct-word .ch{font-size:clamp(19px,4.5vw,32px);color:#f1d68a;visibility:hidden;
    text-shadow:0 1px 1px rgba(40,20,5,.6), 0 0 12px rgba(255,210,130,.4)}
  .ct-word .ch.show{visibility:visible;animation:coverPop .5s cubic-bezier(.2,1.5,.4,1)}
  @keyframes coverPop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
  .flyer{position:fixed;z-index:9;pointer-events:none;font-family:'Ruslan Display','Uncial Antiqua',serif;
    color:#f4dc92;text-shadow:0 0 14px rgba(255,214,140,.8);transform-origin:center;
    transition:transform .7s cubic-bezier(.35,0,.2,1), opacity .7s ease}
  /* smooth dive into the book + bright light when the word is complete */
  #lock.diving .scene{animation:diveIn 1.25s cubic-bezier(.5,0,.65,1) forwards}
  #lock.diving .tome{animation-play-state:paused}
  /* fade the page block + spine so no flat "white pages" flash behind the cover */
  #lock.diving .tome-back,#lock.diving .tome-pages,#lock.diving .tome-spine{animation:diveFade .35s ease forwards}
  #lock.diving #letters{animation:diveFade .4s ease forwards}
  @keyframes diveIn{to{transform:scale(4.4)}}
  @keyframes diveFade{to{opacity:0}}
  #flash{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:0;transform:scale(.7);
    background:radial-gradient(circle at 50% 47%, #ffffff 0%, #fff6db 34%, #ffe19c 60%, rgba(255,220,150,0) 84%)}
  #flash.burst{animation:flashBurst 2.3s cubic-bezier(.4,0,.3,1) forwards}
  @keyframes flashBurst{0%{opacity:0;transform:scale(.6)}36%{opacity:1;transform:scale(1.08)}58%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1.7)}}
  .spark{position:fixed;z-index:95;pointer-events:none;transform:translate(-50%,-50%);
    color:#fff4d2;font-size:var(--sz);line-height:1;text-shadow:0 0 12px rgba(255,224,160,.95);
    animation:sparkFly 1.2s ease-out forwards}
  .spark::before{content:"\2726"}
  @keyframes sparkFly{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}18%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.15) rotate(40deg)}}

  /* ---------- book stage ---------- */
  #stage{position:relative;z-index:1;display:none;flex-direction:column;align-items:center;gap:18px;width:100%;padding:8px;
    perspective:2400px;perspective-origin:50% 38%}
  #bookHost{position:relative;display:flex;align-items:center;justify-content:center;
    transform:rotateX(15deg) rotateZ(-1.2deg);transform-origin:50% 50%;
    animation:bookIn 1.2s cubic-bezier(.2,.7,.2,1) both}
  @keyframes bookIn{
    0%{transform:rotateX(19deg) rotateZ(-1.2deg) scale(1.08);opacity:0}
    100%{transform:rotateX(15deg) rotateZ(-1.2deg) scale(1);opacity:1}
  }
  #book{margin:0 auto;position:relative;z-index:2;
    filter:drop-shadow(0 12px 18px rgba(0,0,0,.5)) drop-shadow(0 0 64px rgba(255,201,130,.16))}
  /* book thickness behind the flipping pages: back cover + page block */
  .book-base{position:absolute;top:50%;left:50%;pointer-events:none;
    transition:width .5s cubic-bezier(.3,.7,.3,1), height .5s ease, transform .5s cubic-bezier(.3,.7,.3,1), opacity .25s ease}
  .book-base.back{z-index:0;border-radius:7px 11px 14px 11px;
    background:linear-gradient(160deg,#4a2e18,#281607);box-shadow:0 36px 56px -12px rgba(0,0,0,.85)}
  .book-base.pages{z-index:1;border-radius:4px 8px 11px 8px;
    background:repeating-linear-gradient(0deg,#f4e9cd 0 1.7px,#d4bf95 1.7px 3.4px)}
  .book-spine{position:absolute;top:50%;left:50%;z-index:3;pointer-events:none;display:none;
    transition:transform .5s cubic-bezier(.3,.7,.3,1), opacity .25s ease;
    border-radius:11px 4px 4px 11px;
    background:linear-gradient(90deg,#1f1208 0%,#4a2d16 40%,#5b3a22 62%,#2e1c0e 96%,#160c05 100%);
    box-shadow:inset -3px 0 5px rgba(0,0,0,.45), inset 2px 0 3px rgba(255,222,160,.18), -6px 14px 22px rgba(0,0,0,.5)}
  .book-spine::before,.book-spine::after{content:"";position:absolute;left:3px;right:4px;height:4px;border-radius:3px;
    background:linear-gradient(#6e4726,#291808)}
  .book-spine::before{top:24%}.book-spine::after{bottom:24%}
  #book .page{background:var(--parch);overflow:hidden}
  .page .frame{
    position:absolute;inset:10px;
    border:18px solid transparent;border-image:url('frame.svg') 18 stretch;
    padding:clamp(16px,2.6vw,30px) clamp(16px,3.4vw,40px);
    display:flex;flex-direction:column;justify-content:center;
    background:
      linear-gradient(90deg, rgba(74,48,22,.20), transparent 11%, transparent 89%, rgba(74,48,22,.20)),
      radial-gradient(60% 50% at 28% 18%, rgba(255,250,234,.6), transparent 62%),
      radial-gradient(55% 60% at 82% 82%, rgba(188,158,108,.32), transparent 60%),
      radial-gradient(130% 120% at 50% 50%, #f7ecd2 0%, #ecdcb4 58%, #ddc89c 100%);
  }
  .frame.center{text-align:center;align-items:center}

  .illum{font-family:'Uncial Antiqua',serif;font-weight:400;font-size:clamp(22px,4.4vw,34px);line-height:1.25;color:var(--red)}
  .illum .name{color:var(--blue)}
  .body{font-size:clamp(16px,2.3vw,20px);line-height:1.85}
  .dropcap::first-letter{
    font-family:'UnifrakturCook',serif;font-weight:700;font-size:3.6em;line-height:.72;
    float:left;margin:.04em .12em 0 0;color:var(--red);
    text-shadow:1px 1px 0 var(--gold-soft);
  }
  .caption{margin-top:14px;text-align:center;font-style:italic;font-size:clamp(14px,2vw,18px);color:var(--ink-soft)}
  .note{font-size:clamp(13px,1.9vw,16px);font-style:italic;color:var(--ink-soft)}
  .divider{margin:18px 0;color:var(--gold);font-size:18px;letter-spacing:2px}
  .divider.sm{margin:14px 0 0;font-size:16px}
  .photo-frame{padding:18px}
  .photo-frame img{width:100%;flex:1;min-height:0;object-fit:cover;border:3px solid var(--gold);border-radius:2px;background:#fff;box-shadow:0 6px 18px -10px rgba(0,0,0,.5)}
  .finale{font-family:'Uncial Antiqua',serif;font-size:clamp(20px,3.6vw,28px);line-height:1.4;color:var(--red)}
  .finale-heart{font-size:48px;color:var(--red);margin:14px 0;animation:beat 1.8s ease-in-out infinite}

  /* hard covers (inside book) — same leather as the lock tome */
  .page-cover{background:linear-gradient(165deg, rgba(255,226,172,.16), rgba(0,0,0,0) 36%, rgba(0,0,0,.32)), url('cover.svg') center/cover no-repeat !important;color:#f0dcae}
  .cover-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .cover-corner{position:absolute;color:var(--gold-soft);font-size:20px;opacity:.85}
  .cover-corner.tl{top:12px;left:14px}.cover-corner.tr{top:12px;right:14px}
  .cover-corner.bl{bottom:12px;left:14px}.cover-corner.br{bottom:12px;right:14px}
  .cover-eyebrow{font-family:'EB Garamond',serif;font-style:italic;letter-spacing:.3em;text-transform:uppercase;font-size:14px;color:var(--gold-soft)}
  .cover-title{font-family:'Uncial Antiqua',serif;font-weight:400;font-size:clamp(34px,7vw,52px);color:#f4e3bd;margin:6px 0}
  .cover-heart{font-size:40px;color:var(--gold-soft);margin:8px 0;animation:beat 1.8s ease-in-out infinite}
  .cover-heart.small{font-size:28px}
  .cover-sub{font-style:italic;font-size:15px;color:#e9d6a8;opacity:.85;margin-top:8px}
  .cover-end{font-family:'Uncial Antiqua',serif;font-size:30px;color:#f4e3bd}

  .nav{display:flex;gap:18px;align-items:center;z-index:2}
  .nav button{font-family:'Uncial Antiqua',serif;font-size:14px;color:#f4e3bd;background:rgba(0,0,0,.25);
    border:1px solid var(--gold);border-radius:8px;padding:9px 18px;cursor:var(--wand);transition:background .2s}
  .nav button:hover{background:rgba(0,0,0,.45)}
  .nav .pg{color:#e9d6a8;font-style:italic;min-width:70px;text-align:center;font-family:'EB Garamond',serif}

  @media (prefers-reduced-motion:reduce){.dust i,.clasp,.cover-heart,.finale-heart{animation:none}}
</style>
</head>
<body>
<div class="dust" aria-hidden="true"></div>
<audio id="bg-audio" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
  <source src="music.m4a" type="audio/mp4">
  <source src="music.ogg" type="audio/ogg">
  <source src="music.wav" type="audio/wav">
</audio>
<button id="music-btn" type="button" class="off" aria-label="Включить музыку"></button>
<div id="flash" aria-hidden="true"></div>

<div id="lock">
  <div class="scene">
    <div class="tome" id="tome" aria-label="Книга">
      <div class="tome-back"></div>
      <div class="tome-pages"></div>
      <div class="tome-face">
        <div class="cover-name">
          <span class="ct-prefix">Сказка&nbsp;о</span>
          <span class="ct-word" id="coverWord"></span>
        </div>
      </div>
      <div class="tome-spine"></div>
    </div>
  </div>
  <div id="letters" aria-hidden="true"></div>
</div>

<div id="stage">
  <div id="bookHost"></div>
</div>
<div id="app" hidden aria-hidden="true"></div>

  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:PAYLOAD.iter, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, data);
  return new TextDecoder().decode(plain);
}

const PAGE_RATIO = 520 / 726; // page width / height ≈ 0.716
function computeBook(){
  const portrait = window.innerWidth < 760;
  const availW = window.innerWidth - 20;
  const availH = window.innerHeight - 82; // room for nav + gaps
  if (portrait){
    let w = Math.min(availW, availH * PAGE_RATIO);
    return { pageW: Math.round(w), pageH: Math.round(w / PAGE_RATIO), spreadW: Math.round(w), portrait:true };
  }
  const spreadR = PAGE_RATIO * 2;        // two pages side by side
  let w = Math.min(availW, availH * spreadR);
  let h = w / spreadR;
  return { pageW: Math.round(w / 2), pageH: Math.round(h), spreadW: Math.round(w), portrait:false };
}

let flip, pagesHTML = '', curPage = 0, controlsWired = false, baseBack, basePages, bookDims, navMin = 1, navMax = 1;
function buildBook(){
  const host = document.getElementById('bookHost');
  if (!window.St || !St.PageFlip){ host.classList.add('fallback'); host.innerHTML = '<div id="book">'+pagesHTML+'</div>'; return; }
  if (flip){ try{ curPage = flip.getCurrentPageIndex(); flip.destroy(); }catch(e){} }
  host.innerHTML = '';                                  // discard old book entirely
  const c = computeBook(); bookDims = c;
  baseBack = document.createElement('div'); baseBack.className = 'book-base back';
  basePages = document.createElement('div'); basePages.className = 'book-base pages';
  const el = document.createElement('div'); el.id = 'book'; el.innerHTML = pagesHTML;
  host.appendChild(baseBack); host.appendChild(basePages); host.appendChild(el);
  el.style.width = c.spreadW + 'px';
  el.style.height = c.pageH + 'px';
  // book thickness — always full-spread (the closed cover is never reachable, so the book stays open)
  baseBack.style.width = basePages.style.width = c.spreadW + 'px';
  baseBack.style.height = basePages.style.height = c.pageH + 'px';
  baseBack.style.transform = 'translate(-50%,-50%) translate(15px,18px)';
  basePages.style.transform = 'translate(-50%,-50%) translate(8px,10px)';
  flip = new St.PageFlip(el, {
    width: c.pageW, height: c.pageH, size:'fixed',
    minWidth:1, maxWidth:5000, minHeight:1, maxHeight:6000,
    maxShadowOpacity:0.55, showCover:true, usePortrait: c.portrait,
    mobileScrollSupport:false, drawShadow:true, flippingTime:850,
  });
  flip.loadFromHTML(el.querySelectorAll('.page'));
  window.__flip = flip;
  const total = flip.getPageCount();
  navMin = 1; navMax = total - 3;                 // first spread .. last spread; both leather covers stay unreachable
  const clamp = () => { const i = flip.getCurrentPageIndex(); if (i < navMin) flip.turnToPage(navMin); else if (i > navMax) flip.turnToPage(navMax); };
  try{ flip.turnToPage(Math.min(Math.max(curPage || navMin, navMin), navMax)); }catch(e){}   // open on the first spread

  flip.on('flip', () => clamp());
  flip.on('changeState', e => { if (e.data === 'read') clamp(); });   // safety net: snap back if something overshoots

  // block even STARTING a fold toward a cover — the closing half of the page won't respond
  const blockEdge = (e) => {
    if (!flip) return;
    const i = flip.getCurrentPageIndex(), r = el.getBoundingClientRect();
    const cx = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
    const leftHalf = (cx - r.left) < r.width / 2;
    if ((i <= navMin && leftHalf) || (i >= navMax && !leftHalf)){ e.stopPropagation(); e.preventDefault(); }
  };
  ['pointerdown','mousedown','touchstart'].forEach(t => el.addEventListener(t, blockEdge, true));

  if (!controlsWired){
    controlsWired = true;
    window.addEventListener('keydown', e => {
      if(e.key==='ArrowLeft' && flip && flip.getCurrentPageIndex() > navMin) flip.flipPrev();
      if(e.key==='ArrowRight' && flip && flip.getCurrentPageIndex() < navMax) flip.flipNext();
    });
    let rt;
    window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(buildBook, 200); });
  }
}

async function openBook(pw){
  try{
    if (window.__startMusic) window.__startMusic();
    const html = await unlock(pw);
    const app = document.getElementById('app');
    app.innerHTML = html;
    const src = app.querySelector('#book-src');
    pagesHTML = src ? src.innerHTML : html;
    document.getElementById('lock').style.display = 'none';
    document.getElementById('stage').style.display = 'flex';
    buildBook();
    try{ if (window.__flip) window.__flip.turnToPage(1); }catch(e){}   // land on the open spread
  }catch(e){ /* the correct word always decrypts */ }
}

// a burst of golden sparks radiating from the centre at the magical moment
function magicBurst(){
  const n = 30;
  for (let i = 0; i < n; i++){
    const s = document.createElement('div'); s.className = 'spark';
    const ang = (i / n) * Math.PI * 2 + Math.random() * 0.4;
    const dist = 160 + Math.random() * 360;
    s.style.left = '50%'; s.style.top = '47%';
    s.style.setProperty('--tx', (Math.cos(ang) * dist).toFixed(0) + 'px');
    s.style.setProperty('--ty', (Math.sin(ang) * dist).toFixed(0) + 'px');
    s.style.setProperty('--sz', (9 + Math.random() * 18).toFixed(0) + 'px');
    s.style.animationDelay = (Math.random() * 0.12).toFixed(2) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1500);
  }
}

// flying-letters lock — collect the letters of the secret word in order, then the book opens itself
(function(){
  const SECRET = 'булочке';
  const target = SECRET.split('');
  const box = document.getElementById('letters');
  const coverWord = document.getElementById('coverWord');
  if (!box || !coverWord) return;
  // reserve every letter's final spot up front (invisible) so landed letters never shift
  const slots = target.map(function(ch){ const s = document.createElement('span'); s.className = 'ch'; s.textContent = ch; coverWord.appendChild(s); return s; });
  let idx = 0, done = false, items = [], W = innerWidth, H = innerHeight;

  const POOL = 'абвгдежзийкмнпрстфхшщыэюяблочука';   // distractors (already include the needed letters)
  function add(ch){
    const el = document.createElement('span');
    el.className = 'fly';
    el.textContent = ch;
    el.style.fontSize = (22 + Math.random()*28).toFixed(0) + 'px';
    el.style.opacity = (0.5 + Math.random()*0.4).toFixed(2);
    const sp = 0.00018 + Math.random()*0.0005, a = Math.random()*Math.PI*2;  // fraction of screen / frame
    const it = { el, ch, fx: Math.random(), fy: Math.random(), vx: Math.cos(a)*sp, vy: Math.sin(a)*sp };
    el.addEventListener('click', () => pick(it));
    box.appendChild(el); items.push(it);
  }
  target.forEach(ch => { for (let k=0;k<6;k++) add(ch); });          // plenty of every needed letter
  for (let i=0;i<36;i++) add(POOL[(Math.random()*POOL.length)|0]);   // many distractors

  function flyTo(srcEl, slot){
    const s = srcEl.getBoundingClientRect();
    const f = document.createElement('span');
    f.className = 'flyer'; f.textContent = srcEl.textContent;
    f.style.left = s.left + 'px'; f.style.top = s.top + 'px';
    f.style.fontSize = getComputedStyle(srcEl).fontSize;
    document.body.appendChild(f);
    srcEl.remove();
    let landed = false;
    const land = function(){ if (landed) return; landed = true; slot.classList.add('show'); f.remove(); };
    requestAnimationFrame(function(){
      const t = slot.getBoundingClientRect();
      const dx = (t.left + t.width/2) - (s.left + s.width/2);
      const dy = (t.top + t.height/2) - (s.top + s.height/2);
      const sc = Math.max(0.4, t.height / Math.max(1, s.height));
      f.style.transform = 'translate(' + dx.toFixed(1) + 'px,' + dy.toFixed(1) + 'px) scale(' + sc.toFixed(2) + ')';
      f.style.opacity = '0.95';
    });
    f.addEventListener('transitionend', land, { once:true });
    setTimeout(land, 900);
  }

  function pick(it){
    if (done || !it.el.isConnected) return;
    if (it.ch === target[idx]){
      items = items.filter(x => x !== it);
      flyTo(it.el, slots[idx]);
      idx++;
      if (idx >= target.length){ done = true;
        setTimeout(function(){
          document.getElementById('lock').classList.add('diving');
          document.getElementById('flash').classList.add('burst');
          magicBurst();
          setTimeout(function(){ openBook(SECRET); }, 1000);   // swap while the screen is full white
        }, 760);   // let the last letter land on the cover first
      }
    } else {
      it.el.classList.remove('wrong'); void it.el.offsetWidth; it.el.classList.add('wrong');
    }
  }

  function frame(){
    W = innerWidth; H = innerHeight;
    const mx = 60/Math.max(1,W), my = 60/Math.max(1,H);
    for (const it of items){
      it.fx += it.vx; it.fy += it.vy;
      if (it.fx < -mx) it.fx = 1+mx; else if (it.fx > 1+mx) it.fx = -mx;
      if (it.fy < -my) it.fy = 1+my; else if (it.fy > 1+my) it.fy = -my;
      it.el.style.transform = 'translate(' + (it.fx*W).toFixed(1) + 'px,' + (it.fy*H).toFixed(1) + 'px)';
    }
    requestAnimationFrame(frame);
  }
  frame();
})();

// sparkle trail following the wand
(function(){
  let last = 0;
  window.addEventListener('pointermove', e => {
    if (e.pointerType && e.pointerType !== 'mouse') return;
    const now = performance.now();
    if (now - last < 38) return;
    last = now;
    const s = document.createElement('div');
    s.className = 'trail';
    s.style.left = e.clientX + 'px';
    s.style.top = e.clientY + 'px';
    s.style.setProperty('--sz', (6 + Math.random()*8).toFixed(1) + 'px');
    s.style.setProperty('--dx', (Math.random()*18 - 9).toFixed(0) + 'px');
    s.style.setProperty('--rot', (Math.random()*120 - 60).toFixed(0) + 'deg');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }, {passive:true});
})();

(function(){
  const wrap = document.querySelector('.dust');
  const N = 48;
  for(let i=0;i<N;i++){
    const d = document.createElement('i');
    const big = Math.random() < 0.18;            // a few big, soft bokeh motes for depth
    const size = big ? (5 + Math.random()*7) : (1.5 + Math.random()*3);
    d.style.width = d.style.height = size.toFixed(1) + 'px';
    d.style.left = (Math.random()*100).toFixed(2) + 'vw';
    d.style.setProperty('--o', (big ? 0.07 + Math.random()*0.09 : 0.22 + Math.random()*0.45).toFixed(2));
    d.style.setProperty('--dx', (Math.random()*70 - 35).toFixed(0) + 'px');
    d.style.animationDuration = ((big ? 28 : 17) + Math.random()*16) + 's';
    d.style.animationDelay = (-Math.random()*44) + 's';
    if (big) d.style.filter = 'blur(2px)';
    wrap.appendChild(d);
  }
})();

// background music — HTML5 <audio> (reliable in Safari/iOS), starts on first gesture, loops, toggle button
(function(){
  var audio = document.getElementById('bg-audio');
  var btn = document.getElementById('music-btn');
  if (!audio || !btn) return;
  audio.volume = 0.55;

  function play(){
    audio.muted = false;
    var p = audio.play();
    if (p && p.catch) p.catch(function(){});   // ignore if no file / blocked; toggle can retry
    updateBtn();
  }
  function toggle(){ if (audio.paused) play(); else { audio.pause(); updateBtn(); } }
  function updateBtn(){
    var on = !audio.paused;
    btn.classList.toggle('off', !on);
    btn.setAttribute('aria-label', on ? 'Выключить музыку' : 'Включить музыку');
  }
  audio.addEventListener('play', updateBtn);
  audio.addEventListener('pause', updateBtn);
  window.__musicInfo = function(){ return { paused: audio.paused, muted: audio.muted, currentSrc: audio.currentSrc, err: audio.error && audio.error.code, t: audio.currentTime }; };

  function firstGesture(e){
    if (e && e.target && e.target.closest && e.target.closest('#music-btn')) return;
    ['pointerdown','touchend','click','keydown'].forEach(function(t){ document.removeEventListener(t, firstGesture); });
    play();                                    // MUST run inside the gesture for Safari/iOS
  }
  ['pointerdown','touchend','click','keydown'].forEach(function(t){ document.addEventListener(t, firstGesture); });
  btn.addEventListener('click', function(e){ e.stopPropagation(); toggle(); });
  window.__startMusic = play;
})();
</script>
